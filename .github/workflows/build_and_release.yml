name: Build and Release Nexus AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências de Build
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview psutil flask flask-cors pythonnet clr-loader requests tqdm

    - name: Gerar Executável do Aplicativo Principal (Nexus AI Pro)
      run: |
        python build_tools/build_main_app.py
      working-directory: nexus

    - name: Gerar Executável do Instalador (Setup Nexus)
      run: |
        python build_tools/build_setup.py
      working-directory: nexus

    - name: Criar Release e Upload dos Executáveis
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/Setup_Nexus.exe
          dist/Nexus_AI_Pro.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
