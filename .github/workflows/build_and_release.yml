name: Build and Release Nexus AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências de Build
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview psutil flask flask-cors pythonnet clr-loader requests tqdm

    - name: Gerar Executável do Aplicativo Principal (Nexus AI Pro)
      run: python nexus/build_tools/build_main_app.py

    - name: Gerar Executável do Instalador (Setup Nexus)
      run: python nexus/build_tools/build_setup.py

    - name: Testar Executável Nexus AI Pro (Verificar Importações)
      shell: pwsh
      run: |
        $env:TEST_IMPORTS="1"
        $proc = Start-Process -FilePath "dist/Nexus_AI_Pro.exe" -NoNewWindow -PassThru
        # Aguarda até 15 segundos para inicialização e teste de importações
        Start-Sleep -Seconds 15
        if (!$proc.HasExited) {
          Write-Host "Executavel ainda em execucao. Forcando encerramento (normal em Session 0)..."
          $proc.Kill()
        }
        # Verifica se o arquivo de sucesso foi criado
        if (!(Test-Path "import_test_main_ok.txt")) {
          throw "Falha critica: O executavel principal Nexus_AI_Pro.exe falhou ao validar as importacoes (arquivo nao gerado)."
        }
        Write-Host "[OK] Nexus_AI_Pro.exe passou no teste de importacao!"

    - name: Testar Executável Setup (Verificar Importações)
      shell: pwsh
      run: |
        $env:TEST_IMPORTS="1"
        $proc = Start-Process -FilePath "dist/Setup_Nexus.exe" -NoNewWindow -PassThru
        # Aguarda até 15 segundos para inicialização e teste de importações
        Start-Sleep -Seconds 15
        if (!$proc.HasExited) {
          Write-Host "Executavel ainda em execucao. Forcando encerramento (normal em Session 0)..."
          $proc.Kill()
        }
        # Verifica se o arquivo de sucesso foi criado
        if (!(Test-Path "import_test_setup_ok.txt")) {
          throw "Falha critica: O instalador Setup_Nexus.exe falhou ao validar as importacoes (arquivo nao gerado)."
        }
        Write-Host "[OK] Setup_Nexus.exe passou no teste de importacao!"

    - name: Criar Release e Upload dos Executáveis
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/Setup_Nexus.exe
          dist/Nexus_AI_Pro.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
